version: '3.8'

services:
  app:
    build: .
    ports:
      - "4000:4000"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-shortbox}
      - DB_USER=${DB_USER:-shortbox}
      - DB_PASSWORD=${DB_PASSWORD:-xxx}
      - PORT=4000
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      - MYSQL_DATABASE=${DB_NAME:-shortbox}
      - MYSQL_USER=${DB_USER:-shortbox}
      - MYSQL_PASSWORD=${DB_PASSWORD:-xxx}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-rootpassword}
    ports:
      - "3336:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
