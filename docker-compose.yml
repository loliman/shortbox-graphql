version: '3.8'

services:
  app:
    build: .
    ports:
      - "4000:4000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-shortbox}
      - DB_USER=${DB_USER:-shortbox}
      - DB_PASSWORD=${DB_PASSWORD:-shortbox}
      - PORT=4000
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules

  db:
    image: postgres:16
    restart: always
    environment:
      - POSTGRES_DB=${DB_NAME:-shortbox}
      - POSTGRES_USER=${DB_USER:-shortbox}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-shortbox}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
