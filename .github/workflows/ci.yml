name: CI Pipeline

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: read

jobs:
  quality-and-build:
    name: Quality and Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
          registry-url: https://npm.pkg.github.com
          scope: "@loliman"

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Auto-format and push changes
        if: ${{ github.actor != 'github-actions[bot]' && github.ref_name != 'main' && (github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)) }}
        run: |
          npm run format

          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "style: auto-format"

            BRANCH="${{ github.head_ref || github.ref_name }}"
            git fetch origin "$BRANCH"
            git pull --rebase origin "$BRANCH" || true
            git push origin "HEAD:$BRANCH" || {
              echo "Auto-format push skipped due to concurrent branch updates."
              exit 0
            }
          else
            echo "No formatting changes detected."
          fi

      - name: Format Check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests with coverage gate (>=80%)
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Package release artifact
        run: |
          VERSION=$(node -p "require('./package.json').version")
          mkdir -p release
          tar -czf "release/shortbox-graphql-${VERSION}.tar.gz" dist package.json package-lock.json sql Dockerfile docker-compose.yml

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: shortbox-graphql-build
          path: release/*.tar.gz

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v6
        with:
          name: shortbox-graphql-coverage
          path: coverage/

      - name: Validate Sonar token
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "SONAR_TOKEN secret is not configured."
            exit 1
          fi

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7.0
        with:
          args: >
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  integration-tests:
    name: Integration Tests (PostgreSQL)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality-and-build
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: shortbox
          POSTGRES_USER: shortbox
          POSTGRES_PASSWORD: shortbox
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -h 127.0.0.1 -p 5432 -U shortbox -d shortbox"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_NAME: shortbox
      DB_USER: shortbox
      DB_PASSWORD: shortbox
      SESSION_SECRET: integration-test-session-secret-at-least-32-chars
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
          registry-url: https://npm.pkg.github.com
          scope: "@loliman"

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if (echo > /dev/tcp/127.0.0.1/5432) >/dev/null 2>&1; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL did not become ready in time"
          exit 1

      - name: Run integration tests
        run: npm run test:integration
